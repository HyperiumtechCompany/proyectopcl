// ── Utility ───────────────────────────────────────────────────────────────────
const fmt = (n: number, d = 2) =>
  n.toLocaleString("es-PE", { minimumFractionDigits: d, maximumFractionDigits: d });

const sectionIcon = { LABOR: Users, MATERIAL: Package, EQUIPMENT: Wrench };
const sectionColor = {
  LABOR: "text-blue-400",
  MATERIAL: "text-emerald-400",
  EQUIPMENT: "text-amber-400"
};

// ── ACU Table ─────────────────────────────────────────────────────────────────
function AcuSection({ section, rendimiento }: { section: AcuSection; rendimiento: number }) {
  const [expanded, setExpanded] = useState(true);
  const Icon = sectionIcon[section.type];
  const color = sectionColor[section.type];

  return (
    <div className="border-b border-slate-700">
      <div
        className="flex items-center gap-2 px-3 py-1.5 bg-slate-800/80 cursor-pointer hover:bg-slate-750 select-none"
        onClick={() => setExpanded(e => !e)}
      >
        {expanded ? <ChevronDown size={13} className="text-slate-400" /> : <ChevronRight size={13} className="text-slate-400" />}
        <Icon size={13} className={color} />
        <span className="text-xs font-semibold text-slate-200 tracking-wide">{section.label}</span>
        <span className={`ml-auto text-xs font-bold ${color}`}>{fmt(section.subtotal)}</span>
      </div>

      {expanded && (
        <table className="w-full text-xs">
          <tbody>
            {section.items.map((item) => (
              <tr key={item.id} className="group hover:bg-slate-700/40 border-b border-slate-700/50">
                <td className="pl-8 pr-2 py-1 text-slate-500 w-28 font-mono text-[10px]">{item.code}</td>
                <td className="px-2 py-1 text-slate-200 min-w-0">
                  <span className="block truncate max-w-xs">{item.description}</span>
                </td>
                <td className="px-2 py-1 text-slate-400 text-center w-10">{item.unit}</td>
                <td className="px-2 py-1 text-right text-slate-300 w-16">{fmt(item.cuadrilla, 2)}</td>
                <td className="px-2 py-1 text-right text-slate-300 w-16">{item.rendimiento.toFixed(4)}</td>
                <td className="px-2 py-1 text-right text-slate-300 w-14">{fmt(item.percentD, 2)}</td>
                <td className="px-2 py-1 text-right text-slate-300 w-20">{fmt(item.price, 2)}</td>
                <td className="px-2 py-1 text-right font-semibold text-slate-100 w-20 pr-3">{fmt(item.total, 2)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </div>
  );
}

