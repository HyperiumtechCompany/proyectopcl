// ── Budget Row ────────────────────────────────────────────────────────────────
function BudgetRow({
  item, isSelected, onSelect, onToggle, editingId, onStartEdit, onEndEdit
}: {
  item: BudgetItem;
  isSelected: boolean;
  onSelect: (id: string) => void;
  onToggle: (id: string) => void;
  editingId: string | null;
  onStartEdit: (id: string) => void;
  onEndEdit: () => void;
}) {
  const isPartida = item.level > 0;
  const isTitle = item.level === 0;
  const indent = item.level * 20;

  return (
    <tr
      className={`group cursor-pointer border-b border-slate-700/60 transition-colors
        ${isSelected ? "bg-sky-900/40 border-sky-700/50" : "hover:bg-slate-700/30"}
        ${isTitle ? "bg-slate-800/60" : ""}
      `}
      onClick={() => {
        onSelect(item.id);
        if (isPartida) onSelect(item.id);
      }}
    >
      {/* Description */}
      <td className="py-1 pr-1" style={{ paddingLeft: `${indent + 8}px` }}>
        <div className="flex items-center gap-1">
          {item.children.length > 0 ? (
            <button
              onClick={e => { e.stopPropagation(); onToggle(item.id); }}
              className="text-slate-400 hover:text-slate-200 flex-shrink-0"
            >
              {item.expanded
                ? <ChevronDown size={14} />
                : <ChevronRight size={14} />
              }
            </button>
          ) : <span className="w-[14px]" />}
          {isTitle
            ? <span className="text-sky-300 font-semibold text-xs tracking-wide">{item.description}</span>
            : (
              <button
                className="text-left text-xs text-slate-300 hover:text-sky-300 transition-colors truncate max-w-[280px]"
                title={item.description}
              >
                {item.description}
              </button>
            )
          }
        </div>
      </td>

      {/* Unit */}
      <td className="px-2 py-1 text-center text-xs text-slate-400 w-14">
        {item.unit}
      </td>

      {/* Quantity */}
      <td className="px-2 py-1 text-right text-xs text-slate-300 w-20 font-mono">
        {isPartida && item.quantity > 0 ? fmt(item.quantity, 2) : ""}
      </td>

      {/* Unit Price */}
      <td className="px-2 py-1 text-right text-xs w-24 font-mono">
        {isPartida && item.unitPrice > 0 ? (
          <span className={`font-semibold ${isSelected ? "text-sky-300" : "text-orange-400"}`}>
            {fmt(item.unitPrice, 2)}
          </span>
        ) : ""}
      </td>

      {/* Total */}
      <td className="px-3 py-1 text-right text-xs font-bold w-24 font-mono">
        <span className={isTitle ? "text-sky-400" : "text-slate-200"}>
          {fmt(item.total, 2)}
        </span>
      </td>
    </tr>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
export default function DelphinsApp() {
  const [items, setItems] = useState(initialItems);
  const [selectedId, setSelectedId] = useState<string | null>("1-1");
  const [editingId, setEditingId] = useState<string | null>(null);
  const [splitPct, setSplitPct] = useState(42);
  const [searchText, setSearchText] = useState("");
  const [activeTab, setActiveTab] = useState<"presupuesto" | "recursos" | "reportes">("presupuesto");
  const dragging = useRef(false);

  // Flatten tree for rendering
  const flatItems = useMemo(() => {
    const result: BudgetItem[] = [];
    const visit = (ids: string[]) => {
      for (const id of ids) {
        const item = items[id];
        if (!item) continue;
        result.push(item);
        if (item.expanded && item.children.length > 0) {
          visit(item.children);
        }
      }
    };
    visit(rootOrder);
    return result;
  }, [items]);

  const handleToggle = useCallback((id: string) => {
    setItems(prev => ({
      ...prev,
      [id]: { ...prev[id], expanded: !prev[id].expanded }
    }));
  }, []);

  const selectedItem = selectedId ? items[selectedId] : null;

  // Grand total
  const grandTotal = useMemo(() =>
    rootOrder.reduce((s, id) => s + (items[id]?.total ?? 0), 0)
    , [items]);

  // Drag divider
  const onDividerMouseDown = useCallback((e: React.MouseEvent) => {
    dragging.current = true;
    const startX = e.clientX;
    const startPct = splitPct;

    const onMove = (ev: MouseEvent) => {
      if (!dragging.current) return;
      const container = document.getElementById("split-container");
      if (!container) return;
      const rect = container.getBoundingClientRect();
      const newPct = Math.max(25, Math.min(70, startPct + ((ev.clientX - startX) / rect.width) * 100));
      setSplitPct(newPct);
    };
    const onUp = () => { dragging.current = false; };

    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp, { once: true });
    e.preventDefault();
  }, [splitPct]);

  const tabs = [
    { id: "presupuesto", label: "Presupuesto", icon: Layers },
    { id: "recursos", label: "Recursos", icon: Package },
    { id: "reportes", label: "Reportes", icon: FileText },
  ] as const;

  return (
    <div className="h-screen flex flex-col bg-slate-900 text-slate-200 font-sans overflow-hidden"
      style={{ fontFamily: "'JetBrains Mono', 'Consolas', monospace" }}
    >
      {/* ── Toolbar ── */}
      <div className="flex items-center gap-0 border-b border-slate-700 bg-slate-850 px-2 py-1 flex-shrink-0"
        style={{ backgroundColor: "#1a2235" }}
      >
        {/* Logo */}
        <div className="flex items-center gap-2 pr-4 mr-2 border-r border-slate-700">
          <div className="w-7 h-7 rounded bg-sky-600 flex items-center justify-center">
            <Calculator size={14} className="text-white" />
          </div>
          <span className="text-xs font-bold text-sky-400 tracking-widest uppercase">S10·Web</span>
        </div>

        {/* Tabs */}
        {tabs.map(({ id, label, icon: Icon }) => (
          <button
            key={id}
            onClick={() => setActiveTab(id)}
            className={`flex items-center gap-1.5 px-3 py-1.5 text-xs rounded transition-colors mr-0.5
              ${activeTab === id
                ? "bg-sky-700/30 text-sky-300 border border-sky-600/40"
                : "text-slate-400 hover:text-slate-200 hover:bg-slate-700/30"
              }`}
          >
            <Icon size={12} />
            {label}
          </button>
        ))}

        <div className="flex-1" />

        {/* Actions */}
        <div className="flex items-center gap-1">
          <button className="flex items-center gap-1.5 px-2.5 py-1 text-xs bg-emerald-700/30 text-emerald-300 border border-emerald-600/30 rounded hover:bg-emerald-700/50 transition-colors">
            <Plus size={11} /> Partida
          </button>
          <button className="flex items-center gap-1.5 px-2.5 py-1 text-xs bg-slate-700/50 text-slate-300 border border-slate-600/40 rounded hover:bg-slate-700 transition-colors">
            <Copy size={11} /> Copiar
          </button>
          <button className="flex items-center gap-1.5 px-2.5 py-1 text-xs bg-red-900/30 text-red-400 border border-red-700/30 rounded hover:bg-red-900/50 transition-colors">
            <Trash2 size={11} />
          </button>
          <div className="w-px h-5 bg-slate-700 mx-1" />
          <button className="p-1.5 text-slate-400 hover:text-slate-200 hover:bg-slate-700/50 rounded">
            <Settings size={13} />
          </button>
        </div>
      </div>

      {/* ── Project bar ── */}
      <div className="flex items-center gap-3 px-3 py-1 bg-slate-800/50 border-b border-slate-700 flex-shrink-0 text-xs">
        <FolderOpen size={12} className="text-amber-400" />
        <span className="text-slate-500">Proyecto:</span>
        <span className="text-amber-300 font-semibold">MEJORAMIENTO DE PISTAS Y VEREDAS - SECTOR 03</span>
        <span className="text-slate-600 mx-1">|</span>
        <span className="text-slate-500">Moneda:</span>
        <span className="text-slate-300">S/. (Soles)</span>
        <span className="text-slate-600 mx-1">|</span>
        <span className="text-slate-500">IGV:</span>
        <span className="text-slate-300">18%</span>
        <div className="flex-1" />
        <span className="text-slate-500">Total Presupuesto:</span>
        <span className="text-sky-400 font-bold font-mono">{fmt(grandTotal)}</span>
      </div>

      {/* ── Main split ── */}
      <div id="split-container" className="flex flex-1 overflow-hidden min-h-0">
        {/* LEFT: Budget tree */}
        <div className="flex flex-col overflow-hidden min-w-0" style={{ width: `${splitPct}%` }}>
          {/* Search */}
          <div className="flex items-center gap-2 px-2 py-1.5 border-b border-slate-700 bg-slate-800/30 flex-shrink-0">
            <Search size={11} className="text-slate-500 flex-shrink-0" />
            <input
              type="text"
              placeholder="Buscar partida..."
              value={searchText}
              onChange={e => setSearchText(e.target.value)}
              className="flex-1 bg-transparent text-xs text-slate-300 placeholder-slate-600 focus:outline-none"
            />
            {searchText && (
              <button onClick={() => setSearchText("")} className="text-slate-500 hover:text-slate-300">
                <X size={11} />
              </button>
            )}
          </div>

          {/* Table header */}
          <div className="flex-shrink-0 border-b border-slate-600 bg-slate-800">
            <table className="w-full text-[10px] text-slate-500 uppercase tracking-wider">
              <thead>
                <tr>
                  <th className="text-left py-1.5 pl-3 font-medium">Descripción</th>
                  <th className="text-center py-1.5 w-14 font-medium">Und.</th>
                  <th className="text-right py-1.5 w-20 font-medium">Cantidad</th>
                  <th className="text-right py-1.5 w-24 font-medium">P. Unit.</th>
                  <th className="text-right py-1.5 w-24 pr-3 font-medium">Total</th>
                </tr>
              </thead>
            </table>
          </div>

          {/* Rows */}
          <div className="flex-1 overflow-auto">
            <table className="w-full">
              <tbody>
                {flatItems
                  .filter(item =>
                    !searchText ||
                    item.description.toLowerCase().includes(searchText.toLowerCase()) ||
                    item.code.includes(searchText)
                  )
                  .map(item => (
                    <BudgetRow
                      key={item.id}
                      item={item}
                      isSelected={selectedId === item.id}
                      onSelect={setSelectedId}
                      onToggle={handleToggle}
                      editingId={editingId}
                      onStartEdit={setEditingId}
                      onEndEdit={() => setEditingId(null)}
                    />
                  ))
                }
              </tbody>
            </table>
          </div>

          {/* Status bar */}
          <div className="flex items-center gap-3 px-3 py-1 border-t border-slate-700 bg-slate-800/50 flex-shrink-0">
            <span className="text-[10px] text-slate-500">
              PROYECTO: (Incidencia de costos)
            </span>
            <div className="flex-1" />
            <span className="text-[10px] text-slate-500">
              {flatItems.length} partidas
            </span>
          </div>
        </div>

        {/* ── Divider ── */}
        <div
          className="w-1 bg-slate-700 hover:bg-sky-600 cursor-col-resize flex-shrink-0 flex items-center justify-center transition-colors group"
          onMouseDown={onDividerMouseDown}
        >
          <div className="w-0.5 h-8 bg-slate-500 group-hover:bg-sky-400 rounded-full" />
        </div>

        {/* RIGHT: ACU */}
        <div className="flex-1 overflow-hidden min-w-0">
          <AcuPanel item={selectedItem?.acu.length ? selectedItem : null} />
        </div>
      </div>
    </div>
  );
}